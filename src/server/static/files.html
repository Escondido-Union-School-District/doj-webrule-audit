<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOJ WebRule Audit — Linked Files Review</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="files.css">
</head>
<body>
  <div class="sticky-header">
    <h1><a href="/" style="color:inherit;text-decoration:none;">DOJ WebRule Audit</a> — Linked Files</h1>
    <div class="dashboard" id="dashboard"></div>
    <div class="filter-bar">
      <select id="filter-status">
        <option value="">All Statuses</option>
        <option value="unreviewed">Unreviewed</option>
        <option value="pass">Pass</option>
        <option value="fail">Fail</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search files or pages...">
      <button id="btn-clear-filters">Clear</button>
    </div>
  </div>

  <div id="grid" class="grid-container">
    <div class="loading">Loading...</div>
  </div>

  <div id="pagination" class="pagination-bar hidden">
    <span class="page-info" id="page-info"></span>
    <div class="pagination-controls">
      <label>Per page:
        <select id="per-page">
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </label>
      <button id="btn-prev">Prev</button>
      <button id="btn-next">Next</button>
    </div>
  </div>

  <script src="files.js?v=8"></script>
</body>
</html>
