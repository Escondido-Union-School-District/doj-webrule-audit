<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOJ WebRule Audit — Review</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sticky-header">
    <h1>DOJ WebRule Audit — Review <a href="/files.html" style="font-size:0.7em; font-weight:400; color:#2563eb; margin-left:12px;">Linked Files →</a></h1>
    <div class="dashboard" id="dashboard"></div>
    <div class="hidden-checks-bar" id="hidden-checks-bar" style="display:none;"></div>
    <div class="filter-bar" id="pagination-top">
      <select id="filter-status">
        <option value="">All Statuses</option>
      </select>
      <select id="filter-site">
        <option value="">All Sites</option>
      </select>
      <select id="filter-check">
        <option value="">All Checks</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search pages...">
      <button id="btn-clear-filters">Clear</button>
      <span class="filter-separator"></span>
      <span class="page-info" id="page-info-top"></span>
      <label>Per page:
        <select id="per-page-top">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
        </select>
      </label>
      <button id="btn-prev-top">Prev</button>
      <button id="btn-next-top">Next</button>
    </div>
  </div>

  <div id="grid" class="grid-container">
    <div class="loading">Loading...</div>
  </div>

  <div id="pagination" class="pagination-bar hidden">
    <span class="page-info" id="page-info"></span>
    <div class="pagination-controls">
      <label>Per page:
        <select id="per-page">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
        </select>
      </label>
      <button id="btn-prev">Prev</button>
      <button id="btn-next">Next</button>
    </div>
  </div>

  <script src="app.js?v=10"></script>
</body>
</html>
